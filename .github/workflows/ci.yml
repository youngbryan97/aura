name: Aura CI/CD Pipeline

on:
  push:
    branches: ["main", "develop", "mutation/*"]
  pull_request:
    branches: ["main"]

jobs:
  test-and-lint:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio pytest-mock ruff mypy bandit detect-secrets

      - name: Lint critical runtime surfaces
        run: |
          ruff check --select E9,F63,F7,F82 \
            aura_main.py \
            core/bus/shared_mem_bus.py \
            interface/server.py \
            tests/test_boot_smoke.py \
            tests/test_boot_health.py \
            tests/test_ui_bootstrap_contract.py \
            tests/test_server_runtime_hardening.py \
            tests/test_launcher_polish_contract.py

      - name: Security scan with Bandit
        run: |
          bandit -r aura_main.py interface/server.py core/bus/shared_mem_bus.py -ll -ii || true

      - name: Scan for secrets
        run: |
          detect-secrets scan --exclude-files "tests/.*" > .secrets.baseline

      - name: Compile key runtime surfaces
        run: |
          python -m py_compile aura_main.py interface/server.py core/bus/shared_mem_bus.py

      - name: Run launch and runtime contract suite
        env:
          AURA_ENVIRONMENT: "test"
          WEBKIT_DISABLE_COMPOSITING_MODE: "1"
        run: |
          pytest \
            tests/test_boot_smoke.py \
            tests/test_boot_health.py \
            tests/test_ui_bootstrap_contract.py \
            tests/test_server_runtime_hardening.py \
            tests/test_launcher_polish_contract.py \
            -q --tb=short
