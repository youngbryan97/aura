version: '3.8'

services:
  redis-broker:
    image: redis:alpine
    ports:
      - "127.0.0.1:6379:6379"
    restart: unless-stopped

  celery-worker:
    build: .
    command: celery -A core.tasks worker --loglevel=info
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    environment:
      - REDIS_URL=redis://redis-broker:6379/0
      - AURA_ENV=production
    depends_on:
      - redis-broker
    restart: unless-stopped

  aura:
    build: .
    ports:
      - "127.0.0.1:8000:8000"
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    environment:
      - AURA_ENV=production
      - AURA_INTERNAL_ONLY=1
      - REDIS_URL=redis://redis-broker:6379/0
      - AURA_HOST=0.0.0.0
      - AURA_PORT=8000
    depends_on:
      - redis-broker
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/health')" ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
